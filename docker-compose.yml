services:
  prometheus:
    image: prom/prometheus:latest
    ports:
      - "127.0.0.1:9090:9090"
    volumes:
      - ./ops/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./ops/monitoring/prometheus-alerts.yml:/etc/prometheus/prometheus-alerts.yml:ro
      - prometheus_data:/prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.retention.time=7d
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./ops/monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./ops/monitoring/grafana/dashboards:/etc/grafana/dashboards:ro
    depends_on:
      - prometheus
    restart: unless-stopped

  writeagent:
    image: ${WRITEAGENT_IMAGE:-ghcr.io/your-org/writeagent}:${WRITEAGENT_TAG:-latest}
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "127.0.0.1:${WRITEAGENT_PORT:-8000}:8000"
    env_file:
      - .env
    environment:
      CHROMA_PERSIST_DIR: /app/chroma_data
      LANGCHAIN_TRACING_V2: ${LANGCHAIN_TRACING_V2:-false}
    volumes:
      - writeagent_chroma:/app/chroma_data
      - writeagent_audit:/app/audit_logs
      - writeagent_state:/app/novel_states
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/api/v1/admin/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s
    restart: unless-stopped

volumes:
  prometheus_data:
  grafana_data:
  writeagent_chroma:
  writeagent_audit:
  writeagent_state:
