name: WriteAgent CI

on:
  pull_request:
  push:
    branches:
      - main
      - master
      - workflow-setup
      - workflow-setup

jobs:
  test-and-security:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: .

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pip-audit bandit

      - name: Validate FastAPI app import
        env:
          LANGCHAIN_TRACING_V2: "false"
          DASHSCOPE_API_KEY: "test-key"
        run: |
          python -c "from api.app import app; print(app.title)"

      - name: Run unit tests
        env:
          LANGCHAIN_TRACING_V2: "false"
          DASHSCOPE_API_KEY: "test-key"
        run: |
          pytest tests/unit -q

      - name: Run integration tests
        env:
          LANGCHAIN_TRACING_V2: "false"
          DASHSCOPE_API_KEY: "test-key"
        run: |
          pytest tests/integration -q

      - name: Run AI security tests
        env:
          LANGCHAIN_TRACING_V2: "false"
          DASHSCOPE_API_KEY: "test-key"
        run: |
          pytest tests/unit/test_guardrails.py tests/unit/test_consistency_checker.py -q

      - name: Run Bandit
        run: |
          bandit -r . -x ./tests,./lib -s B101,B104,B105,B110

      - name: Run dependency audit
        run: |
          # Temporary allowlist: pip-audit reports CVE-2026-4539 on transitive
          # pygments 2.19.2 with no published fix version yet. Keep auditing
          # enabled, but do not fail CI on this specific unresolved advisory.
          pip-audit -r requirements.txt --ignore-vuln CVE-2026-4539

  docker-build-check:
    runs-on: ubuntu-latest
    needs: test-and-security

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: false
          tags: writeagent:ci
