name: WriteAgent CI

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  test-and-security:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: WriteAgent

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: WriteAgent/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pip-audit bandit

      - name: Validate FastAPI app import
        env:
          LANGCHAIN_TRACING_V2: "false"
          DASHSCOPE_API_KEY: "test-key"
        run: |
          python -c "from api.app import app; print(app.title)"

      - name: Run unit tests
        env:
          LANGCHAIN_TRACING_V2: "false"
          DASHSCOPE_API_KEY: "test-key"
        run: |
          pytest tests/unit -q

      - name: Run integration tests
        env:
          LANGCHAIN_TRACING_V2: "false"
          DASHSCOPE_API_KEY: "test-key"
        run: |
          pytest tests/integration -q

      - name: Run AI security tests
        env:
          LANGCHAIN_TRACING_V2: "false"
          DASHSCOPE_API_KEY: "test-key"
        run: |
          pytest tests/unit/test_guardrails.py tests/unit/test_consistency_checker.py -q

      - name: Run Bandit
        run: |
          bandit -r . -x tests,lib

      - name: Run dependency audit
        run: |
          pip-audit -r requirements.txt

  docker-build-check:
    runs-on: ubuntu-latest
    needs: test-and-security

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: ./WriteAgent
          file: ./WriteAgent/Dockerfile
          push: false
          tags: writeagent:ci
