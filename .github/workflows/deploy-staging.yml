name: Deploy Staging

on:
  workflow_run:
    workflows: ["WriteAgent Docker Release"]
    types:
      - completed
  workflow_dispatch:
    inputs:
      image_tag:
        description: Docker image tag to deploy
        required: true
        default: latest

jobs:
  deploy:
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' &&
      (github.event.workflow_run.head_branch == 'main' || github.event.workflow_run.head_branch == 'master'))
    runs-on: ubuntu-latest
    environment: staging
    permissions:
      contents: read
      packages: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve image tag
        id: vars
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "image_tag=${{ github.event.inputs.image_tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "image_tag=latest" >> "$GITHUB_OUTPUT"
          fi

      - name: Clean stale monitoring files on server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          script: |
            sudo rm -rf ~/writeagent/ops/monitoring
            mkdir -p ~/writeagent/ops/monitoring

      - name: Copy compose files to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          source: "docker-compose.yml,docker-compose.staging.yml,ops/monitoring"
          target: "~/writeagent"
          overwrite: true

      - name: Deploy on staging server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          script: |
            set -eu
            mkdir -p ~/writeagent
            cd ~/writeagent
            OWNER_LC=$(printf '%s' "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
            cat > .env <<EOF
            DASHSCOPE_API_KEY=${{ secrets.DASHSCOPE_API_KEY }}
            QWEN_MODEL_NAME=${{ vars.QWEN_MODEL_NAME || 'qwen-max' }}
            QWEN_BASE_URL=${{ vars.QWEN_BASE_URL || 'https://dashscope.aliyuncs.com/compatible-mode/v1' }}
            LLM_TEMPERATURE=${{ vars.LLM_TEMPERATURE || '0.8' }}
            LLM_MAX_TOKENS=${{ vars.LLM_MAX_TOKENS || '2048' }}
            CHROMA_PERSIST_DIR=/app/chroma_data
            SLIDING_WINDOW_SIZE=${{ vars.SLIDING_WINDOW_SIZE || '5' }}
            HOT_CONTEXT_MAX_TOKENS=${{ vars.HOT_CONTEXT_MAX_TOKENS || '8000' }}
            RETRIEVAL_K=${{ vars.RETRIEVAL_K || '8' }}
            MAX_NEGOTIATION_ROUNDS=${{ vars.MAX_NEGOTIATION_ROUNDS || '3' }}
            LANGCHAIN_TRACING_V2=${{ vars.LANGCHAIN_TRACING_V2 || 'false' }}
            LANGCHAIN_API_KEY=${{ secrets.LANGCHAIN_API_KEY }}
            LANGCHAIN_PROJECT=${{ vars.LANGCHAIN_PROJECT || 'WriteAgent' }}
            LANGCHAIN_ENDPOINT=${{ vars.LANGCHAIN_ENDPOINT || 'https://api.smith.langchain.com' }}
            PROMPT_VERSION=${{ vars.PROMPT_VERSION || 'v1' }}
            PROMPTS_DIR=/app/prompts
            WRITEAGENT_IMAGE=ghcr.io/${OWNER_LC}/writeagent
            WRITEAGENT_TAG=${{ steps.vars.outputs.image_tag }}
            WRITEAGENT_PORT=${{ vars.WRITEAGENT_PORT || '8000' }}
            EOF
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin
            docker compose -f docker-compose.yml -f docker-compose.staging.yml pull
            docker compose -f docker-compose.yml -f docker-compose.staging.yml up -d
            for i in $(seq 1 12); do
              if curl -fsS "http://localhost:${{ vars.WRITEAGENT_PORT || '8000' }}/api/v1/admin/health"; then
                exit 0
              fi
              sleep 10
            done
            docker compose -f docker-compose.yml -f docker-compose.staging.yml ps
            docker compose -f docker-compose.yml -f docker-compose.staging.yml logs --tail=200
            exit 1
